<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>فهرس مكتبة كلية الحقوق والعلوم السياسية – جامعة جيجل</title>

<style>

body{
    font-family:Arial;
    margin:40px;
    direction: rtl;
    background:linear-gradient(to right,#eef2f3,#dfe9f3);
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px 20px;
    border-radius:12px;
    margin-bottom:20px;
    background:white;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* LOGO */
.header img{
    width:90px;
    height:90px;
    object-fit:contain;
    border-radius:10px;
}

/* TEXT */
.header-text h2{
    font-size:16px;
    color:#003366;
    margin:0;
    font-weight:700;
}

.faculty-title{
    font-size:32px;
    color:#1a8f3a;
    font-weight:900;
    margin:3px 0 0;
}

/* TITLE */
h1{
    color:#003366;
    text-align:center;
}

/* INPUT */
input{
    padding:12px;
    width:250px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
    margin:5px;
}

/* TABLE */
table{
    border-collapse:collapse;
    width:100%;
    margin-top:20px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th,td{
    border:1px solid #eee;
    padding:10px;
    text-align:right;
}

th{
    background:#003366;
    color:white;
    cursor:pointer;
}

tr:hover{
    background:#f1f1f1;
}

/* BUTTON */
button{
    padding:10px 15px;
    margin:5px;
    border:none;
    background:#003366;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

    <!-- 👇 الشعار هنا -->
    <img src="logo.png" alt="شعار الجامعة">

    <div class="header-text">
        <h2>جامعة محمد الصديق بن يحيى – جيجل</h2>
        <div class="faculty-title">كلية الحقوق والعلوم السياسية</div>
    </div>

</div>

<h1>فهرس مكتبة الكلية</h1>

</body>
</html>
