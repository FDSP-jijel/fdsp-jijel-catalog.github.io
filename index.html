<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>فهرس مكتبة كلية الحقوق والعلوم السياسية – جامعة جيجل</title>

<style>
body{
    font-family:Arial;
    margin:40px;
    direction: rtl;

    background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("college.jpg");

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    color:white;
}

h1{
    color:white;
    text-shadow:0 2px 5px rgba(0,0,0,0.6);
}

/* INPUT */
input{
    padding:12px;
    width:250px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
    margin:5px;
}

/* TABLE */
table{
    border-collapse:collapse;
    width:100%;
    margin-top:20px;
    background: rgba(255,255,255,0.95);
    border-radius:10px;
    overflow:hidden;
    backdrop-filter: blur(6px);
}

th,td{
    border:1px solid #eee;
    padding:10px;
    text-align:right;
}

th{
    background:#003366;
    color:white;
    cursor:pointer;
}

tr:hover{
    background:#f1f1f1;
}

/* BUTTON */
button{
    padding:10px 15px;
    margin:5px;
    border:none;
    background:#003366;
    color:white;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0055aa;
    transform:translateY(-2px);
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:15px;
    background:white;
    padding:15px 20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
    position:sticky;
    top:0;
    z-index:1000;
}

.header img{
    width:70px;
    height:70px;
    object-fit:contain;
    background:white;
    padding:5px;
    border-radius:10px;
}

.header-text h2{
    font-size:16px;
    color:#003366;
    margin:0;
    font-weight:700;
}

.faculty-title{
    font-size:34px;
    color:#1a8f3a;
    font-weight:900;
    margin:3px 0 0;
    letter-spacing:1px;
}

.header-text p{
    margin:3px 0 0;
    color:#555;
    font-size:15px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<div class="header">
    <img src="logo.png" alt="شعار الجامعة">
    <div class="header-text">
        <h2>جامعة محمد الصديق بن يحيى – جيجل</h2>
        <p class="faculty-title">كلية الحقوق والعلوم السياسية</p>
    </div>
</div>

<h1 style="text-align:center;">فهرس مكتبة الكلية</h1>

<input type="text" id="search" placeholder="بحث عام..." onkeyup="searchTable()">

<br>

<input type="text" id="authorFilter" placeholder="فلترة بالمؤلف">
<input type="text" id="yearFilter" placeholder="فلترة بالسنة">
<button onclick="advancedFilter()">تطبيق الفلتر</button>

<p id="count"></p>

<table>
<thead>
<tr>
<th onclick="sortTable('title')">العنوان</th>
<th onclick="sortTable('author')">المؤلف</th>
<th onclick="sortTable('publisher')">دار النشر</th>
<th onclick="sortTable('place')">مكان النشر</th>
<th onclick="sortTable('edition')">الطبعة</th>
<th onclick="sortTable('year')">سنة النشر</th>
<th onclick="sortTable('class')">رقم التصنيف</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<br>

<button onclick="prevPage()">السابق</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">التالي</button>

<br>

<button onclick="downloadExcel()">تحميل Excel</button>

<script>

let data = [];
let currentData = [];
let currentPage = 1;
let rowsPerPage = 100;

let sortDirection = 1;
let lastSort = "";

/* تحميل البيانات */
fetch("catalog_FDSP_jijel.csv")
.then(res => res.text())
.then(text => {

    text = text.replace(/^\uFEFF/, "");
    const rows = text.split(/\r?\n/);

    rows.slice(1).forEach(row => {

        if(!row.trim()) return;

        let cols = row.split(";");

        if(cols.length < 8){
            cols = row.split("\t");
        }

        cols = cols.map(c => c.replace(/^"|"$/g,"").trim());

        if(cols.length >= 8){
            data.push({
                title: cols[1] || "",
                author: cols[2] || "",
                publisher: cols[3] || "",
                place: cols[5] || "",
                edition: cols[6] || "",
                year: cols[4] || "",
                class: cols[7] || ""
            });
        }
    });

    display(data);
});

/* العرض */
function display(rows){

    currentData = rows;

    const maxPage = Math.max(1, Math.ceil(rows.length / rowsPerPage));
    if(currentPage > maxPage) currentPage = 1;

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;

    rows.slice(start, end).forEach(r=>{
        tbody.innerHTML += `
        <tr>
            <td>${r.title}</td>
            <td>${r.author}</td>
            <td>${r.publisher}</td>
            <td>${r.place}</td>
            <td>${r.edition}</td>
            <td>${r.year}</td>
            <td>${r.class}</td>
        </tr>`;
    });

    document.getElementById("count").innerText =
        `عدد الكتب: ${rows.length}`;

    document.getElementById("pageInfo").innerText =
        `صفحة ${currentPage} / ${Math.ceil(rows.length / rowsPerPage)}`;
}

/* باقي الدوال كما هي */
function searchTable(){
    const q = document.getElementById("search").value.toLowerCase();

    const filtered = data.filter(r =>
        Object.values(r).some(val =>
            val && val.toLowerCase().includes(q)
        )
    );

    currentPage = 1;
    display(filtered);
}

function advancedFilter(){
    const author = document.getElementById("authorFilter").value.toLowerCase();
    const year = document.getElementById("yearFilter").value;

    const filtered = data.filter(r =>
        (!author || r.author.toLowerCase().includes(author)) &&
        (!year || r.year.includes(year))
    );

    currentPage = 1;
    display(filtered);
}

function nextPage(){
    if(currentPage < Math.ceil(currentData.length / rowsPerPage)){
        currentPage++;
        display(currentData);
    }
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        display(currentData);
    }
}

function downloadExcel(){
    const ws = XLSX.utils.json_to_sheet(currentData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "catalog");
    XLSX.writeFile(wb, "catalog.xlsx");
}

</script>

</body>
</html>
