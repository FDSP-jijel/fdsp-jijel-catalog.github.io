<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>فهرس مكتبة كلية الحقوق والعلوم السياسية – جامعة جيجل</title>

<style>
body{
    font-family:Arial;
    margin:40px;
    background:linear-gradient(to right,#eef2f3,#dfe9f3);
}
h1{color:#003366;}
input{
    padding:12px;
    width:300px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}
table{
    border-collapse:collapse;
    width:100%;
    margin-top:20px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}
th,td{
    border:1px solid #eee;
    padding:10px;
    text-align:right;
}
th{
    background:#003366;
    color:white;
}
tr:hover{background:#f1f1f1;}
button{
    padding:10px 15px;
    margin:5px;
    border:none;
    background:#003366;
    color:white;
    border-radius:6px;
    cursor:pointer;
}
button:hover{background:#0055aa;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>فهرس مكتبة كلية الحقوق والعلوم السياسية</h1>
<p>جامعة محمد الصديق بن يحيى – جيجل – الجزائر</p>

<input type="text" id="search" placeholder="ابحث عن كتاب..." onkeyup="searchTable()">

<table id="table">
<thead>
<tr>
<th>العنوان</th>
<th>المؤلف</th>
<th>دار النشر</th>
<th>مكان النشر</th>
<th>الطبعة</th>
<th>سنة النشر</th>
<th>رقم التصنيف</th>
</tr>
</thead>
<tbody></tbody>
</table>

<br>
<button onclick="prevPage()">السابق</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">التالي</button>

<br>
<button onclick="downloadPDF()">تحميل PDF</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
<script>

let data = [];
let currentPage = 1;
let rowsPerPage = 100;

fetch("catalog_FDSP_jijel.csv")
.then(response => response.text())
.then(text => {

    text = text.replace(/^\uFEFF/, "");

    const rows = text.split(/\r?\n/);

    rows.slice(1).forEach(row => {

        if(!row.trim()) return;

        let cols = row.split(/[\t;,]/);

        cols = cols.map(c => c.replace(/^"|"$/g,"").trim());

        if(cols.length >= 8){
            data.push({
                title: cols[1] || "",
                author: cols[2] || "",
                publisher: cols[3] || "",
                place: cols[5] || "",
                edition: cols[6] || "",
                year: cols[4] || "",
                class: cols[7] || ""
            });
        }
    });

    display(data);
});

function display(rows){
    const table = document.querySelector("#table tbody");
    table.innerHTML="";

    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;

    const pageRows = rows.slice(start, end);

    pageRows.forEach(r=>{
        const tr = document.createElement("tr");

        tr.innerHTML = `
        <td>${r.title}</td>
        <td>${r.author}</td>
        <td>${r.publisher}</td>
        <td>${r.place}</td>
        <td>${r.edition}</td>
        <td>${r.year}</td>
        <td>${r.class}</td>
        `;

        table.appendChild(tr);
    });

    document.getElementById("pageInfo").innerText =
        "صفحة " + currentPage + " / " + Math.ceil(rows.length / rowsPerPage);
}

function searchTable(){
    const q = document.getElementById("search").value.toLowerCase();

    const filtered = data.filter(r =>
        Object.values(r).some(val =>
            val && val.toLowerCase().includes(q)
        )
    );

    currentPage = 1;
    display(filtered);
}

function nextPage(){
    currentPage++;
    display(data);
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        display(data);
    }
}

function downloadPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const tableData = data.slice(0,50).map(r => [
        r.title,
        r.author,
        r.publisher,
        r.place,
        r.edition,
        r.year,
        r.class
    ]);

    doc.autoTable({
        head: [["العنوان","المؤلف","الناشر","المكان","الطبعة","السنة","التصنيف"]],
        body: tableData,
        styles: {
            font: "helvetica",
            halign: "right"
        }
    });

    doc.save("catalog.pdf");
}

</script>

</body>
</html>
