<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>فهرس مكتبة كلية الحقوق والعلوم السياسية – جامعة جيجل</title>

<style>
body{font-family:Arial;margin:40px;background:#f5f5f5}
h1{color:#003366}
input{padding:10px;width:300px;font-size:16px}
table{border-collapse:collapse;width:100%;margin-top:20px;background:white}
th,td{border:1px solid #ccc;padding:8px;text-align:right}
th{background:#003366;color:white}
</style>

</head>

<body>

<h1>فهرس مكتبة كلية الحقوق والعلوم السياسية</h1>
<p>جامعة محمد الصديق بن يحيى – جيجل – الجزائر</p>

<input type="text" id="search" placeholder="ابحث عن كتاب..." onkeyup="searchTable()">

<table id="table">
<thead>
<tr>
<th>العنوان</th>
<th>المؤلف</th>
<th>دار النشر</th>
<th>مكان النشر</th>
<th>الطبعة</th>
<th>سنة النشر</th>
<th>رقم التصنيف</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let data = [];

fetch("catalog_FDSP_jijel.csv")
.then(response => response.text())
.then(text => {

    text = text.replace(/^\uFEFF/, ""); // إزالة BOM من CSV

    console.log("CSV loaded");   // للتأكد أن الملف وصل

    const rows = text.split(/\r?\n/);

    rows.slice(1).forEach(row => {

        if(!row.trim()) return;

        let cols = row.split(";");

        if(cols.length < 8){
            cols = row.split(",");
        }

        cols = cols.map(c => c.replace(/^"|"$/g,"").trim());

        if(cols.length >= 8){
            data.push({
                title: cols[1] || "",
                author: cols[2] || "",
                publisher: cols[3] || "",
                year: cols[4] || "",
                class: cols[7] || ""
            });
        }
    });

    console.log("Books loaded:", data.length);  // كم كتاب تم قراءته

    display(data);
});

function display(rows){
    const table = document.querySelector("#table tbody");
    table.innerHTML="";

    rows.slice(0,300).forEach(r=>{
        const tr = document.createElement("tr");

        tr.innerHTML = `
        <td>${r.title}</td>
        <td>${r.author}</td>
        <td>${r.publisher}</td>
        <td>${r.year}</td>
        <td>${r.class}</td>
        `;

        table.appendChild(tr);
    });
}

function searchTable(){
    const q = document.getElementById("search").value.toLowerCase();

    const filtered = data.filter(r =>
        (r.title && r.title.toLowerCase().includes(q)) ||
        (r.author && r.author.toLowerCase().includes(q)) ||
        (r.class && r.class.toLowerCase().includes(q))
    );

    display(filtered);
}
</script>

</body>
</html>
