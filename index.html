<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>فهرس مكتبة كلية الحقوق والعلوم السياسية – جامعة جيجل</title>

<style>
body{
    font-family:Arial;
    margin:40px;
    background:linear-gradient(to right,#eef2f3,#dfe9f3);
    direction: rtl;
}

h1{color:#003366;}

input{
    padding:12px;
    width:250px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
    margin:5px;
}

table{
    border-collapse:collapse;
    width:100%;
    margin-top:20px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th,td{
    border:1px solid #eee;
    padding:10px;
    text-align:right;
}

th{
    background:#003366;
    color:white;
    cursor:pointer;
}

tr:hover{background:#f1f1f1;}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    background:#003366;
    color:white;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0055aa;
    transform:translateY(-2px);
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:15px;
    background:white;
    padding:15px 20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
    position:sticky;
    top:0;
    z-index:1000;
    backdrop-filter: blur(6px);
}

.header img{
    width:70px;
    height:70px;
    object-fit:contain;
    background:white;
    padding:5px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.header-text h2{
    margin:0;
    color:#003366;
    font-size:20px;
    font-weight:bold;
}

.faculty-title{
    margin:3px 0 0;
    color:#1a8f3a;
    font-size:24px;
    font-weight:800;
    text-shadow:0 1px 2px rgba(0,0,0,0.1);
}

.header-text p{
    margin:3px 0 0;
    color:#555;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#003366;
    box-shadow:0 0 5px rgba(0,51,102,0.3);
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<div class="header">
    <img src="logo.png" alt="شعار الجامعة">
    <div class="header-text">
        <h2>جامعة محمد الصديق بن يحيى – جيجل</h2>
        <p class="faculty-title">كلية الحقوق والعلوم السياسية</p>
    </div>
</div>

<h1 style="text-align:center;">فهرس مكتبة الكلية</h1>

<input type="text" id="search" placeholder="بحث عام..." onkeyup="searchTable()">

<br>

<input type="text" id="authorFilter" placeholder="فلترة بالمؤلف">
<input type="text" id="yearFilter" placeholder="فلترة بالسنة">
<button onclick="advancedFilter()">تطبيق الفلتر</button>

<p id="count"></p>

<table>
<thead>
<tr>
<th onclick="sortTable('title')">العنوان</th>
<th onclick="sortTable('author')">المؤلف</th>
<th onclick="sortTable('publisher')">دار النشر</th>
<th onclick="sortTable('place')">مكان النشر</th>
<th onclick="sortTable('edition')">الطبعة</th>
<th onclick="sortTable('year')">سنة النشر</th>
<th onclick="sortTable('class')">رقم التصنيف</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<br>

<button onclick="prevPage()">السابق</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">التالي</button>

<br>

<button onclick="downloadExcel()">تحميل Excel</button>

<script>

let data = [];
let currentData = [];
let currentPage = 1;
let rowsPerPage = 100;

let sortDirection = 1;
let lastSort = "";

/* تحميل البيانات */
fetch("catalog_FDSP_jijel.csv")
.then(res => res.text())
.then(text => {

    text = text.replace(/^\uFEFF/, "");
    const rows = text.split(/\r?\n/);

    rows.slice(1).forEach(row => {

        if(!row.trim()) return;

        let cols = row.split(";");

        if(cols.length < 8){
            cols = row.split("\t");
        }

        cols = cols.map(c => c.replace(/^"|"$/g,"").trim());

        if(cols.length >= 8){
            data.push({
                title: cols[1] || "",
                author: cols[2] || "",
                publisher: cols[3] || "",
                place: cols[5] || "",
                edition: cols[6] || "",
                year: cols[4] || "",
                class: cols[7] || ""
            });
        }
    });

    display(data);
});

/* العرض */
function display(rows){

    currentData = rows;

    const maxPage = Math.max(1, Math.ceil(rows.length / rowsPerPage));
    if(currentPage > maxPage) currentPage = 1;

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    if(rows.length === 0){
        document.getElementById("count").innerText = "عدد الكتب: 0";
        document.getElementById("pageInfo").innerText = "";
        tbody.innerHTML = "<tr><td colspan='7'>لا توجد نتائج</td></tr>";
        return;
    }

    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;

    const pageRows = rows.slice(start, end);

    let html = "";
    pageRows.forEach(r=>{
        html += `
        <tr>
            <td>${r.title}</td>
            <td>${r.author}</td>
            <td>${r.publisher}</td>
            <td>${r.place}</td>
            <td>${r.edition}</td>
            <td>${r.year}</td>
            <td>${r.class}</td>
        </tr>`;
    });

    tbody.innerHTML = html;

    document.getElementById("count").innerText =
        `عدد الكتب: ${rows.length}`;

    document.getElementById("pageInfo").innerText =
        `صفحة ${currentPage} / ${maxPage}`;
}

/* ترتيب */
function sortTable(field){

    if(lastSort === field){
        sortDirection *= -1;
    } else {
        sortDirection = 1;
        lastSort = field;
    }

    const sorted = [...currentData].sort((a,b)=>{

        let valA = a[field] || "";
        let valB = b[field] || "";

        if(!isNaN(valA) && !isNaN(valB)){
            return (Number(valA) - Number(valB)) * sortDirection;
        }

        return valA.localeCompare(valB) * sortDirection;
    });

    currentPage = 1;
    display(sorted);
}

/* بحث */
function searchTable(){

    const q = document.getElementById("search").value.toLowerCase();

    const filtered = data.filter(r =>
        Object.values(r).some(val =>
            val && val.toLowerCase().includes(q)
        )
    );

    currentPage = 1;
    display(filtered);
}

/* فلترة */
function advancedFilter(){

    const author = document.getElementById("authorFilter").value.toLowerCase();
    const year = document.getElementById("yearFilter").value;

    const filtered = data.filter(r =>
        (!author || r.author.toLowerCase().includes(author)) &&
        (!year || r.year.includes(year))
    );

    currentPage = 1;
    display(filtered);
}

/* صفحات */
function nextPage(){
    if(currentPage < Math.ceil(currentData.length / rowsPerPage)){
        currentPage++;
        display(currentData);
    }
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        display(currentData);
    }
}

/* Excel */
function downloadExcel(){

    const ws = XLSX.utils.json_to_sheet(currentData.map(r => ({
        العنوان: r.title,
        المؤلف: r.author,
        النشر: r.publisher,
        المكان: r.place,
        الطبعة: r.edition,
        السنة: r.year,
        التصنيف: r.class
    })));

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "catalog");
    XLSX.writeFile(wb, "catalog.xlsx");
}

</script>

</body>
</html>
