<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>فهرس مكتبة كلية الحقوق والعلوم السياسية – جامعة جيجل</title>

<style>
body{font-family:Arial;margin:40px;background:#f5f5f5}
h1{color:#003366}
input{padding:10px;width:300px;font-size:16px}
table{border-collapse:collapse;width:100%;margin-top:20px;background:white}
th,td{border:1px solid #ccc;padding:8px;text-align:right}
th{background:#003366;color:white}
</style>

</head>

<body>

<h1>فهرس مكتبة كلية الحقوق والعلوم السياسية</h1>
<p>جامعة محمد الصديق بن يحيى – جيجل – الجزائر</p>

<input type="text" id="search" placeholder="ابحث عن كتاب..." onkeyup="searchTable()">

<table id="table">
<thead>
<tr>
<th>العنوان</th>
<th>المؤلف</th>
<th>دار النشر</th>
<th>سنة النشر</th>
<th>رقم التصنيف</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let data=[];

fetch('catalogue_FDSP_jijel.csv')
.then(response=>response.text())
.then(text=>{
let rows=text.split('\n').slice(1);

rows.forEach(row=>{
let cols=row.split(',');
if(cols.length>7){
data.push({
title:cols[1],
author:cols[2],
publisher:cols[3],
year:cols[4],
class:cols[7]
});
}
});

display(data);
});

function display(rows){
let table=document.querySelector("#table tbody");
table.innerHTML="";
rows.slice(0,200).forEach(r=>{
table.innerHTML+=`
<tr>
<td>${r.title}</td>
<td>${r.author}</td>
<td>${r.publisher}</td>
<td>${r.year}</td>
<td>${r.class}</td>
</tr>`;
});
}

function searchTable(){
let q=document.getElementById("search").value.toLowerCase();
let filtered=data.filter(r=>
r.title.toLowerCase().includes(q) ||
r.author.toLowerCase().includes(q) ||
r.class.toLowerCase().includes(q)
);
display(filtered);
}
</script>

</body>
</html>
